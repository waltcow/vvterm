[package]
name = "herdr-client-kit"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "herdr_client_kit"
crate-type = ["staticlib", "rlib"]

[dependencies]
bincode = { version = "2.0.1", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "unwind"
strip = "symbols"
